<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cool Country Info</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* (UNCHANGED STYLES — kept yours exactly) */
:root {
    --bg: #121110;
    --card: #1c1a19;
    --accent: #b5835a;
    --accent-dim: rgba(181, 131, 90, 0.15);
    --text: #e7e5e4;
    --muted: #a8a29e;
    --border: #3c3633;
    --success: #36533f;
    --error: #7f1d1d;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);}
header{text-align:center;padding:2.5rem 1rem;}
header h1{font-family:'Playfair Display';color:var(--accent);}
nav{display:flex;justify-content:center;gap:.8rem;padding:1rem;background:#121110;border-bottom:1px solid var(--border);}
.nav-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:.6rem 1.5rem;}
.nav-btn.active{color:var(--accent);}
.container{max-width:1100px;margin:auto;padding:1rem;}
.controls{display:flex;gap:10px;position:relative;}
#search-input{flex:1;padding:1rem;background:var(--card);color:white;border:1px solid var(--border);}
.btn-rand{background:var(--accent);border:none;color:white;padding:0 1rem;cursor:pointer;}
#auto-box{position:absolute;top:105%;left:0;right:150px;background:var(--card);display:none;}
.auto-item{padding:.5rem;cursor:pointer;}
.auto-item:hover{background:var(--accent-dim);}
.view{display:none;}
.view.active{display:block;}
</style>
</head>

<body>

<header>
<h1>Cool Country Info</h1>
</header>

<nav>
<button class="nav-btn active" id="btn-info" onclick="showView('info')">Info</button>
<button class="nav-btn" id="btn-quiz" onclick="showView('quiz')">Quiz</button>
</nav>

<div class="container">

<section id="view-info" class="view active">
<div class="controls">
<input type="text" id="search-input" placeholder="Type a country name...">
<button class="btn-rand" onclick="pickRandom()">Random</button>
<div id="auto-box"></div>
</div>

<div id="info-root">
<p style="text-align:center;color:gray;">Loading countries...</p>
</div>
</section>

<section id="view-quiz" class="view">
<div id="quiz-root">
<p>Select a country first.</p>
</div>
</section>

</div>

<script>
let countries = [];
let activeSelection = null;

/* INIT */
async function init() {
    try {
        const res = await fetch('https://restcountries.com/v3.1/all?fields=name,capital,currencies,region,subregion,languages,area,population,flags,latlng,car,tld,borders,landlocked');
        countries = await res.json();
        setupSearch();
        pickRandom();
    } catch (e) {
        document.getElementById('info-root').innerHTML =
            "<p style='color:red;text-align:center;'>Failed to load countries.</p>";
    }
}

/* SEARCH */
function setupSearch() {
    const input = document.getElementById('search-input');
    const box = document.getElementById('auto-box');

    input.addEventListener('input', () => {
        const val = input.value.toLowerCase();
        box.innerHTML = '';

        if (val.length < 2) {
            box.style.display = 'none';
            return;
        }

        const matches = countries
            .filter(c => c.name.common.toLowerCase().includes(val))
            .slice(0, 8);

        matches.forEach(c => {
            const div = document.createElement('div');
            div.className = 'auto-item';
            div.textContent = c.name.common;
            div.onclick = () => {
                input.value = c.name.common;
                box.style.display = 'none';
                displayCountry(c);
            };
            box.appendChild(div);
        });

        box.style.display = matches.length ? 'block' : 'none';
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.controls')) box.style.display = 'none';
    });
}

/* RANDOM */
function pickRandom() {
    if (!countries.length) return;
    const c = countries[Math.floor(Math.random() * countries.length)];
    displayCountry(c);
}

/* DISPLAY */
async function displayCountry(c) {
    activeSelection = c;

    let summary = "No summary available.";
    try {
        const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(c.name.common)}`);
        if (res.ok) {
            const data = await res.json();
            if (data.extract) summary = data.extract;
        }
    } catch {}

    const cap = c.capital?.[0] || 'N/A';
    const cur = c.currencies ? Object.values(c.currencies)[0].name : 'N/A';

    document.getElementById('info-root').innerHTML = `
        <h2>${c.name.common}</h2>
        <img src="${c.flags.svg}" width="200">
        <p>${summary}</p>
        <p><b>Capital:</b> ${cap}</p>
        <p><b>Population:</b> ${c.population.toLocaleString()}</p>
        <p><b>Region:</b> ${c.region}</p>
        <p><b>Currency:</b> ${cur}</p>
        <p><b>Area:</b> ${c.area.toLocaleString()} km²</p>

        ${
            c.latlng
            ? `<iframe width="100%" height="300"
               src="https://maps.google.com/maps?q=${c.latlng[0]},${c.latlng[1]}&z=5&output=embed"></iframe>`
            : "<p>No map available</p>"
        }
    `;
}

/* NAV */
function showView(v) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));

    document.getElementById(`view-${v}`).classList.add('active');
    document.getElementById(`btn-${v}`).classList.add('active');
}

/* START */
init();
</script>

</body>
</html>
